name: Passport spec guard

# Fails if the ZK passport validator's base64 ContractSpec is corrupted or
# changed without an intentional, reviewed hash update. Catches the silent
# spec-corruption attack attempted in PRs #284 and #358.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  passport-spec-guard:
    name: Passport spec guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Verify passport ContractSpec integrity
        run: node scripts/check-passport-spec.mjs
