name: Preview

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  issues: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment:
    name: Publish preview instructions
    runs-on: ubuntu-latest
    steps:
      - name: Comment preview location
        uses: actions/github-script@v7
        env:
          VERCEL_PREVIEW_URL: ${{ vars.VERCEL_PREVIEW_URL }}
        with:
          script: |
            const marker = '<!-- open-stellar-preview -->';
            const previewUrl = process.env.VERCEL_PREVIEW_URL;
            const body = previewUrl
              ? `${marker}\nVercel preview: ${previewUrl}`
              : `${marker}\nVercel will publish the deployment preview on this PR when the Vercel GitHub integration is enabled.`;

            try {
              const { owner, repo } = context.repo;
              const issue_number = context.payload.pull_request.number;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              core.warning(`Preview comment skipped: ${error instanceof Error ? error.message : String(error)}`);
            }
